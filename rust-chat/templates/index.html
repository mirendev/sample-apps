<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__TITLE__</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: __ACCENT__;
    --bg: #101114;
    --surface: #1B1F27;
    --surface-2: #151820;
    --border: #2a2f3a;
    --text: #F4F5F5;
    --text-dim: #969CA6;
    --topaz-300: #80ABFF;
    --topaz-700: #0059FF;
    --font-sans: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'DM Mono', ui-monospace, 'Courier New', monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F4F5F5;        /* slate-50 */
      --surface: #FFFFFF;   /* white */
      --surface-2: #F4F5F5; /* slate-50 */
      --border: #E7E8E9;    /* slate-100 */
      --text: #1B1F27;      /* slate-800 */
      --text-dim: #767989;  /* slate-500 */
      --topaz-300: #0059FF; /* topaz-700 (Miren blue) for link contrast on light */
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0, 89, 255, 0.08), transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(246, 131, 75, 0.06), transparent 70%);
    color: var(--text);
    font-family: var(--font-sans);
    line-height: 1.5;
    padding: 2rem;
    letter-spacing: -0.01em;
  }
  main {
    max-width: 56rem;
    width: 100%;
    padding: 2.5rem;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.02),
      0 40px 80px -20px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .chat-wrap {
    display: grid;
    grid-template-columns: 1fr 11rem;
    gap: 1.75rem;
    align-items: stretch;
  }
  .chat-col {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    min-width: 0;
  }
  .members-panel {
    border-left: 1px solid var(--border);
    padding-left: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    min-width: 0;
  }
  .members-panel h2 {
    margin: 0;
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }
  .members-panel ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    overflow-y: auto;
    max-height: 320px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .members-panel li {
    color: var(--topaz-300);
    word-break: break-all;
    line-height: 1.4;
  }
  .members-panel li::before {
    content: '·';
    margin-right: 0.5rem;
    color: var(--text-dim);
  }
  .members-panel li.you { color: var(--accent); }
  .members-panel li.you::before {
    content: '▸';
    color: var(--accent);
  }
  @media (max-width: 640px) {
    body { padding: 1rem; }
    main { padding: 1.25rem; gap: 1.25rem; }
    .chat-wrap { grid-template-columns: 1fr; }
    .members-panel {
      border-left: none;
      border-top: 1px solid var(--border);
      padding-left: 0;
      padding-top: 1rem;
    }
    .members-panel ul { max-height: 120px; }
  }
  .lockup {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    color: var(--text);
  }
  .lockup a { color: inherit; display: inline-flex; }
  .lockup svg { display: block; }
  .lockup .miren { height: 32px; width: auto; flex-shrink: 0; }
  .lockup .tokio { height: 28px; width: auto; }
  .lockup .x {
    font-family: var(--font-mono);
    font-size: 0.875rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  h1 {
    margin: 0;
    font-size: 1.75rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }
  h1 .dot { color: var(--accent); }
  .lede {
    margin: 0;
    font-size: 1rem;
    color: var(--text-dim);
  }
  .lede a {
    color: var(--topaz-300);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 120ms ease;
  }
  .lede a:hover { border-color: var(--topaz-300); }
  .status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .status .you { color: var(--text); }
  .status .you b { color: var(--accent); font-weight: 500; }
  .status .count { color: var(--topaz-300); }
  .messages {
    height: 320px;
    overflow-y: auto;
    padding: 0.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  .msg {
    display: grid;
    grid-template-columns: 9rem 1fr;
    gap: 0.75rem;
    align-items: baseline;
    font-size: 0.9375rem;
    line-height: 1.45;
  }
  .msg .nick {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--topaz-300);
    text-align: right;
    word-break: break-all;
  }
  .msg .text { color: var(--text); word-wrap: break-word; }
  .msg.sys { color: var(--text-dim); font-style: italic; }
  .msg.sys .text { color: var(--text-dim); }
  .msg.self .nick { color: var(--accent); }
  @media (max-width: 640px) {
    .msg { grid-template-columns: 1fr; gap: 0.125rem; }
    .msg .nick { text-align: left; }
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0.25rem 0;
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  form {
    display: flex;
    gap: 0.75rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 0.9375rem;
    letter-spacing: -0.01em;
    outline: none;
    transition: border-color 120ms ease;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }
  button {
    padding: 0.75rem 1.25rem;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0b0d13;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: filter 120ms ease;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  footer {
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  footer b { color: var(--topaz-300); font-weight: 500; }
  footer code { font-family: var(--font-mono); color: var(--text-dim); }
  footer a {
    color: var(--topaz-300);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 120ms ease;
  }
  footer a:hover { border-color: var(--topaz-300); }
</style>
</head>

<script>
(() => {
  const messagesEl = document.getElementById('messages');
  const membersEl = document.getElementById('members');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const youEl = document.getElementById('you');
  const countEl = document.getElementById('count');
  const DEBOUNCE_MS = 3000;
  let me = null;
  let ws = null;
  let members = new Set();
  const pendingLeaves = new Map();

  function esc(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function addMsg(nick, text, opts = {}) {
    const el = document.createElement('div');
    el.className = 'msg' + (opts.sys ? ' sys' : '') + (opts.self ? ' self' : '');
    el.innerHTML = `<span class="nick">${esc(nick)}</span><span class="text">${esc(text)}</span>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addDivider(label) {
    const el = document.createElement('div');
    el.className = 'divider';
    el.innerHTML = `<span>${esc(label)}</span>`;
    messagesEl.appendChild(el);
  }

  function renderMembers(list) {
    members = new Set(list);
    membersEl.innerHTML = '';
    for (const m of [...members].sort()) {
      const li = document.createElement('li');
      if (m === me) li.className = 'you';
      li.textContent = m;
      membersEl.appendChild(li);
    }
    countEl.textContent = members.size;
  }

  function handleJoin(nick) {
    if (nick === me) return;
    if (pendingLeaves.has(nick)) {
      clearTimeout(pendingLeaves.get(nick));
      pendingLeaves.delete(nick);
      return; // suppress both leave and join
    }
    addMsg('system', `${nick} joined`, { sys: true });
  }

  function handleLeave(nick) {
    if (nick === me) return;
    const t = setTimeout(() => {
      addMsg('system', `${nick} left`, { sys: true });
      pendingLeaves.delete(nick);
    }, DEBOUNCE_MS);
    pendingLeaves.set(nick, t);
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.addEventListener('open', () => {
      const stored = localStorage.getItem('rust-chat-nick');
      let uuid = localStorage.getItem('rust-chat-uuid');
      if (!uuid) {
        uuid = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now()) + '-' + Math.random().toString(36).slice(2);
        localStorage.setItem('rust-chat-uuid', uuid);
      }
      ws.send(JSON.stringify({ type: 'hello', nick: stored || null, uuid }));
      input.disabled = false;
      send.disabled = false;
      input.focus();
    });

    ws.addEventListener('message', (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      switch (msg.type) {
        case 'welcome':
          me = msg.nick;
          localStorage.setItem('rust-chat-nick', me);
          youEl.textContent = me;
          renderMembers(msg.members || []);
          if (Array.isArray(msg.history) && msg.history.length) {
            for (const h of msg.history) {
              addMsg(h.nick, h.text, { self: h.nick === me });
            }
            addDivider(`${msg.history.length} recent message${msg.history.length === 1 ? '' : 's'}`);
          }
          addMsg('system', `You are ${me}`, { sys: true });
          break;
        case 'join':
          renderMembers(msg.members || []);
          handleJoin(msg.nick);
          break;
        case 'leave':
          renderMembers(msg.members || []);
          handleLeave(msg.nick);
          break;
        case 'chat':
          addMsg(msg.nick, msg.text, { self: msg.nick === me });
          break;
      }
    });

    ws.addEventListener('close', () => {
      input.disabled = true;
      send.disabled = true;
      addMsg('system', 'disconnected, reconnecting…', { sys: true });
      setTimeout(connect, 2000);
    });
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'send', text }));
    input.value = '';
  });

  connect();
